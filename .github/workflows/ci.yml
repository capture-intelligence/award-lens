name: CI

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main, production]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      - name: Type-check + build dashboard
        run: pnpm --filter @awards/web run build

      - name: Type-check api-worker (dry-run deploy)
        env:
          # Wrangler dry-run only needs to bundle the worker; no token required.
          CLOUDFLARE_API_TOKEN: ''
        working-directory: workers/api
        run: npx wrangler deploy --dry-run

      - name: Lint sidecar JS (no broken imports / syntax)
        run: |
          for f in sidecar-oracle/*.mjs; do
            node --check "$f"
          done
