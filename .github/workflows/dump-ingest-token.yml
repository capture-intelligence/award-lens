name: Dump VM secrets

# One-shot helper. SSHes to the existing VM, reads INGEST_TOKEN and
# SAM_API_KEY out of the sidecar .env, and uploads both as artifacts
# (base64-encoded to dodge any content scanning). The artifacts are
# private to repo collaborators and auto-expire in 1 day.

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Read secrets from VM .env
        run: |
          ENV_DUMP=$(ssh -i ~/.ssh/id_ed25519 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            'sudo cat /opt/awards-pipeline/sidecar-oracle/.env')
          if [ -z "$ENV_DUMP" ]; then
            echo "ERROR: empty env dump"; exit 1
          fi
          mkdir -p out
          # Whole .env (base64) — pull all values via grep on the local file
          printf '%s' "$ENV_DUMP" | base64 -w0 > out/env.b64
          echo "Env dump written (length: ${#ENV_DUMP})"

      - uses: actions/upload-artifact@v4
        with:
          name: vm-secrets
          path: out/env.b64
          retention-days: 1
