name: Run description enrichment

# Manual trigger. Modes:
#   incremental — one batch via the systemd service (synchronous, ≤15 min)
#   backfill    — kick off a long-running detached run on the VM, return immediately
#   status      — peek at progress of a detached backfill (read log + ps)
#   stop        — kill any running backfill on the VM
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'incremental | backfill (detached) | status | stop | diag'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - backfill
          - status
          - stop
          - diag
          - stats
          - probe
          - reset-mod-history
          - trigger-sam-opps
          - solicitations-stats
          - trigger-vendor-enrich
          - vendors-stats

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          # Keep the SSH connection alive during quieter remote operations.
          # 30s heartbeat × max 10 missed = 5 min tolerance for any silence.
          cat >> ~/.ssh/config <<CFG
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
          CFG

      - name: Run enrichment
        env:
          MODE: ${{ inputs.mode }}
        run: |
          SSH="ssh -i ~/.ssh/id_ed25519 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}"

          # Files we use on the VM for backfill orchestration.
          LOG=/tmp/awards-enrich-backfill.log
          PIDFILE=/tmp/awards-enrich-backfill.pid

          case "$MODE" in
            backfill)
              # Detached run. We start the script in the background, capture its
              # PID, dump output to a logfile, and return immediately. The SSH
              # session can close — the process keeps going under nohup.
              $SSH bash <<EOF
                set -e
                echo "=== detaching backfill on VM ==="
                # If a prior backfill is still alive, refuse to start a second.
                if [ -f $PIDFILE ] && kill -0 \$(cat $PIDFILE) 2>/dev/null; then
                  echo "ERROR: backfill PID \$(cat $PIDFILE) is already running. Use mode=stop first."
                  exit 1
                fi
                # Truncate the log so 'status' shows the new run cleanly.
                sudo truncate -s 0 $LOG 2>/dev/null || sudo rm -f $LOG
                sudo touch $LOG
                sudo chown awards:awards $LOG
                # Detach with nohup + setsid + closed stdin so SSH disconnect
                # doesn't propagate SIGHUP. PID lands in PIDFILE.
                # NODE_OPTIONS=--dns-result-order=ipv4first works around an
                # Oracle Always-Free quirk where DNS returns AAAA-only for
                # USAspending and v6 outbound flakes. Curl is fine; Node was
                # not. Same env var is also baked into the systemd unit.
                sudo -u awards bash -c "
                  set -a; source /opt/awards-pipeline/sidecar-oracle/.env; set +a
                  export NODE_OPTIONS='--dns-result-order=ipv4first'
                  nohup setsid node /opt/awards-pipeline/sidecar-oracle/enrich-descriptions.mjs --backfill \
                    >> $LOG 2>&1 < /dev/null &
                  echo \\\$! > $PIDFILE
                "
                sleep 2
                echo "=== started PID \$(cat $PIDFILE) — log at $LOG ==="
                ps -fp \$(cat $PIDFILE) || true
                echo
                echo "=== first 30s of progress ==="
                # Tail with a hard timeout so this step exits even if the
                # script is silent. The script keeps running on the VM.
                timeout 30 tail -f $LOG || true
                echo
                echo "=== detached. Re-run this workflow with mode=status to check progress. ==="
          EOF
              ;;

            status)
              $SSH bash <<EOF
                set -e
                echo "=== process ==="
                if [ -f $PIDFILE ] && kill -0 \$(cat $PIDFILE) 2>/dev/null; then
                  echo "RUNNING (PID \$(cat $PIDFILE))"
                  ps -fp \$(cat $PIDFILE) || true
                else
                  echo "NOT RUNNING"
                fi
                echo
                echo "=== systemd timer ==="
                sudo systemctl list-timers awards-enrich-descriptions.timer --no-pager 2>/dev/null || true
                echo
                echo "=== log tail (last 200 lines) ==="
                if [ -f $LOG ]; then
                  sudo tail -n 200 $LOG
                else
                  echo "no log yet at $LOG"
                fi
          EOF
              ;;

            diag)
              # Probe USAspending reachability from the VM. node -e (single
              # line) avoids the YAML/heredoc indentation pitfalls.
              $SSH bash <<DIAGEOF
                set +e
                echo "=== DNS A records ==="
                dig +short api.usaspending.gov A
                echo "=== DNS AAAA records ==="
                dig +short api.usaspending.gov AAAA
                echo "=== getent hosts ==="
                getent hosts api.usaspending.gov
                echo

                echo "=== curl over IPv4 (-4) ==="
                curl -4 -sS -o /dev/null -w "status=%{http_code} time=%{time_total}s\n" --max-time 15 "https://api.usaspending.gov/api/v2/references/agency/" 2>&1 || echo "curl -4 FAILED"
                echo "=== curl over IPv6 (-6) ==="
                curl -6 -sS -o /dev/null -w "status=%{http_code} time=%{time_total}s\n" --max-time 15 "https://api.usaspending.gov/api/v2/references/agency/" 2>&1 || echo "curl -6 FAILED"
                echo

                PROBE='fetch("https://api.usaspending.gov/api/v2/references/agency/",{signal:AbortSignal.timeout(15000)}).then(r=>console.log(JSON.stringify({ok:r.ok,status:r.status}))).catch(e=>console.log(JSON.stringify({ok:false,error:String(e.message||e)})))'

                echo "=== Node fetch (default DNS order) ==="
                sudo -u awards node -e "\$PROBE" 2>&1
                echo "=== Node fetch (NODE_OPTIONS=--dns-result-order=ipv4first) ==="
                sudo -u awards env NODE_OPTIONS=--dns-result-order=ipv4first node -e "\$PROBE" 2>&1
                echo "=== Node version ==="
                node --version
                echo "=== Probe via explicit dns.lookup family:4 ==="
                PROBE4='const dns=require("dns"); dns.setDefaultResultOrder("ipv4first"); fetch("https://api.usaspending.gov/api/v2/references/agency/",{signal:AbortSignal.timeout(15000)}).then(r=>console.log(JSON.stringify({ok:r.ok,status:r.status}))).catch(e=>console.log(JSON.stringify({ok:false,error:String(e.message||e)})))'
                sudo -u awards node -e "\$PROBE4" 2>&1

                echo
                echo "=== outbound IPv4 ==="
                curl -4 -sS --max-time 5 https://ifconfig.me/ip 2>/dev/null; echo
                echo "=== outbound IPv6 ==="
                curl -6 -sS --max-time 5 https://ifconfig.me/ip 2>/dev/null || echo "(no IPv6 outbound)"
                echo
                echo "=== sanity check: cloudflare reachability ==="
                curl -4 -sS -o /dev/null -w "cloudflare 1.1.1.1: status=%{http_code} time=%{time_total}s\n" --max-time 5 https://1.1.1.1/ 2>&1 || echo "cloudflare FAILED"
                echo "=== sanity check: github reachability ==="
                curl -4 -sS -o /dev/null -w "github: status=%{http_code} time=%{time_total}s\n" --max-time 5 https://api.github.com/ 2>&1 || echo "github FAILED"
                echo "=== last 50 USAspending requests in journalctl (rough rate check) ==="
                sudo journalctl -u awards-sidecar.service -n 200 --no-pager 2>/dev/null | grep -ci "fetch\|usaspending" || echo "(no recent sidecar journal)"
          DIAGEOF
              ;;

            probe)
              # Inspect the wire format of award_id flowing between worker
              # and sidecar. Logs the first row from /sidecar/awards/needing-
              # description-enrich and what JSON.stringify produces — tells
              # us the runtime type the description-enrich filter is seeing.
              $SSH 'set -e; API_BASE=$(sudo grep ^API_BASE= /opt/awards-pipeline/sidecar-oracle/.env | cut -d= -f2-); TOKEN=$(sudo grep ^INGEST_TOKEN= /opt/awards-pipeline/sidecar-oracle/.env | cut -d= -f2-); echo "=== first row from GET ==="; curl -sS -H "Authorization: Bearer $TOKEN" "$API_BASE/sidecar/awards/needing-description-enrich?limit=1" | (python3 -m json.tool 2>/dev/null || cat); echo; echo "=== same row, types ==="; curl -sS -H "Authorization: Bearer $TOKEN" "$API_BASE/sidecar/awards/needing-description-enrich?limit=1" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d[\"results\"][0] if d.get(\"results\") else {}; print(json.dumps({k:{\"value\":v,\"type\":type(v).__name__} for k,v in r.items()}, indent=2))" 2>&1'
              ;;

            trigger-sam-opps)
              # Fire the SAM.gov Opportunities sync immediately. systemd
              # `start` returns non-zero when the unit failed; we tolerate
              # that and dump full journal so the workflow log shows the
              # cause instead of just "Process completed with exit 1".
              $SSH 'set +e; sudo systemctl start awards-sam-opps.service; echo "--- status ---"; sudo systemctl status awards-sam-opps.service --no-pager -n 30; echo "--- journal ---"; sudo journalctl -u awards-sam-opps.service --no-pager -n 80 --since "5 minutes ago"; exit 0'
              ;;

            solicitations-stats)
              $SSH 'set -e; API_BASE=$(sudo grep ^API_BASE= /opt/awards-pipeline/sidecar-oracle/.env | cut -d= -f2-); TOKEN=$(sudo grep ^INGEST_TOKEN= /opt/awards-pipeline/sidecar-oracle/.env | cut -d= -f2-); echo "=== solicitations stats ==="; curl -sS -H "Authorization: Bearer $TOKEN" "$API_BASE/sidecar/solicitations/stats" | (python3 -m json.tool 2>/dev/null || cat); echo'
              ;;

            trigger-vendor-enrich)
              $SSH 'set +e; sudo systemctl start awards-sam-vendors.service; echo "--- status ---"; sudo systemctl status awards-sam-vendors.service --no-pager -n 30; echo "--- journal ---"; sudo journalctl -u awards-sam-vendors.service --no-pager -n 80 --since "5 minutes ago"; exit 0'
              ;;

            vendors-stats)
              $SSH 'set -e; API_BASE=$(sudo grep ^API_BASE= /opt/awards-pipeline/sidecar-oracle/.env | cut -d= -f2-); TOKEN=$(sudo grep ^INGEST_TOKEN= /opt/awards-pipeline/sidecar-oracle/.env | cut -d= -f2-); echo "=== vendor enrichment stats ==="; curl -sS -H "Authorization: Bearer $TOKEN" "$API_BASE/sidecar/vendors/sam-enrichment-stats" | (python3 -m json.tool 2>/dev/null || cat); echo'
              ;;

            reset-mod-history)
              # Hits POST /sidecar/awards/reset-missing-mod-history to clear
              # description_enriched_at on rows where mod_history is NULL.
              # The next backfill sweep then re-fetches both description and
              # transactions for those rows. Description gets overwritten
              # with the same value (fine), mod_history populates for the
              # first time (the URL bug is fixed).
              $SSH 'set -e; API_BASE=$(sudo grep ^API_BASE= /opt/awards-pipeline/sidecar-oracle/.env | cut -d= -f2-); TOKEN=$(sudo grep ^INGEST_TOKEN= /opt/awards-pipeline/sidecar-oracle/.env | cut -d= -f2-); echo "=== reset-missing-mod-history ==="; curl -sS -X POST -H "Authorization: Bearer $TOKEN" "$API_BASE/sidecar/awards/reset-missing-mod-history" | (python3 -m json.tool 2>/dev/null || cat); echo'
              ;;

            stats)
              # Hit the worker's diagnostic route (auth-gated) and pretty-print
              # enrichment counts. Read API_BASE / token from the VM's .env so
              # no extra repo secret is needed. Inline quoted command (no
              # heredoc) — heredoc closer at column 0 ends the YAML run block.
              $SSH 'set -e; API_BASE=$(sudo grep ^API_BASE= /opt/awards-pipeline/sidecar-oracle/.env | cut -d= -f2-); TOKEN=$(sudo grep ^INGEST_TOKEN= /opt/awards-pipeline/sidecar-oracle/.env | cut -d= -f2-); echo "=== enrichment-stats ==="; curl -sS -H "Authorization: Bearer $TOKEN" "$API_BASE/sidecar/awards/enrichment-stats" | (python3 -m json.tool 2>/dev/null || cat); echo'
              ;;

            stop)
              $SSH bash <<EOF
                set -e
                if [ -f $PIDFILE ] && kill -0 \$(cat $PIDFILE) 2>/dev/null; then
                  PID=\$(cat $PIDFILE)
                  echo "Killing backfill PID \$PID"
                  sudo kill -- -\$PID 2>/dev/null || sudo kill \$PID 2>/dev/null || true
                  sleep 2
                  if kill -0 \$PID 2>/dev/null; then
                    echo "Force killing"
                    sudo kill -9 \$PID 2>/dev/null || true
                  fi
                  rm -f $PIDFILE
                  echo "Stopped."
                else
                  echo "Nothing running."
                fi
          EOF
              ;;

            incremental|*)
              # One systemd-driven batch. Synchronous because each batch is
              # bounded (~50 awards, < 2 min on a healthy USAspending day).
              $SSH bash <<EOF
                set -e
                echo "=== firing one service run ==="
                sudo systemctl status awards-enrich-descriptions.service --no-pager -n 3 || true
                sudo systemctl start awards-enrich-descriptions.service
                # Stream the journal as it produces output. journalctl -f
                # keeps SSH active so no broken-pipe risk.
                sleep 2
                sudo journalctl -u awards-enrich-descriptions.service \
                  --no-pager --since "2 minutes ago" -f &
                JPID=\$!
                # Wait for the unit to become inactive.
                while sudo systemctl is-active --quiet awards-enrich-descriptions.service; do
                  sleep 5
                done
                kill \$JPID 2>/dev/null || true
                echo
                echo "=== final status ==="
                sudo systemctl status awards-enrich-descriptions.service --no-pager -n 10 || true
          EOF
              ;;
          esac
