name: Run description enrichment

# Manual trigger. Modes:
#   incremental — one batch via the systemd service (synchronous, ≤15 min)
#   backfill    — kick off a long-running detached run on the VM, return immediately
#   status      — peek at progress of a detached backfill (read log + ps)
#   stop        — kill any running backfill on the VM
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'incremental | backfill (detached) | status | stop | diag'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - backfill
          - status
          - stop
          - diag

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          # Keep the SSH connection alive during quieter remote operations.
          # 30s heartbeat × max 10 missed = 5 min tolerance for any silence.
          cat >> ~/.ssh/config <<CFG
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
          CFG

      - name: Run enrichment
        env:
          MODE: ${{ inputs.mode }}
        run: |
          SSH="ssh -i ~/.ssh/id_ed25519 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}"

          # Files we use on the VM for backfill orchestration.
          LOG=/tmp/awards-enrich-backfill.log
          PIDFILE=/tmp/awards-enrich-backfill.pid

          case "$MODE" in
            backfill)
              # Detached run. We start the script in the background, capture its
              # PID, dump output to a logfile, and return immediately. The SSH
              # session can close — the process keeps going under nohup.
              $SSH bash <<EOF
                set -e
                echo "=== detaching backfill on VM ==="
                # If a prior backfill is still alive, refuse to start a second.
                if [ -f $PIDFILE ] && kill -0 \$(cat $PIDFILE) 2>/dev/null; then
                  echo "ERROR: backfill PID \$(cat $PIDFILE) is already running. Use mode=stop first."
                  exit 1
                fi
                # Truncate the log so 'status' shows the new run cleanly.
                sudo truncate -s 0 $LOG 2>/dev/null || sudo rm -f $LOG
                sudo touch $LOG
                sudo chown awards:awards $LOG
                # Detach with nohup + setsid + closed stdin so SSH disconnect
                # doesn't propagate SIGHUP. PID lands in PIDFILE.
                # NODE_OPTIONS=--dns-result-order=ipv4first works around an
                # Oracle Always-Free quirk where DNS returns AAAA-only for
                # USAspending and v6 outbound flakes. Curl is fine; Node was
                # not. Same env var is also baked into the systemd unit.
                sudo -u awards bash -c "
                  set -a; source /opt/awards-pipeline/sidecar-oracle/.env; set +a
                  export NODE_OPTIONS='--dns-result-order=ipv4first'
                  nohup setsid node /opt/awards-pipeline/sidecar-oracle/enrich-descriptions.mjs --backfill \
                    >> $LOG 2>&1 < /dev/null &
                  echo \\\$! > $PIDFILE
                "
                sleep 2
                echo "=== started PID \$(cat $PIDFILE) — log at $LOG ==="
                ps -fp \$(cat $PIDFILE) || true
                echo
                echo "=== first 30s of progress ==="
                # Tail with a hard timeout so this step exits even if the
                # script is silent. The script keeps running on the VM.
                timeout 30 tail -f $LOG || true
                echo
                echo "=== detached. Re-run this workflow with mode=status to check progress. ==="
          EOF
              ;;

            status)
              $SSH bash <<EOF
                set -e
                echo "=== process ==="
                if [ -f $PIDFILE ] && kill -0 \$(cat $PIDFILE) 2>/dev/null; then
                  echo "RUNNING (PID \$(cat $PIDFILE))"
                  ps -fp \$(cat $PIDFILE) || true
                else
                  echo "NOT RUNNING"
                fi
                echo
                echo "=== systemd timer ==="
                sudo systemctl list-timers awards-enrich-descriptions.timer --no-pager 2>/dev/null || true
                echo
                echo "=== log tail (last 200 lines) ==="
                if [ -f $LOG ]; then
                  sudo tail -n 200 $LOG
                else
                  echo "no log yet at $LOG"
                fi
          EOF
              ;;

            diag)
              # Network reachability + USAspending probe from the VM.
              $SSH bash <<EOF
                set +e
                echo "=== DNS ==="
                getent hosts api.usaspending.gov
                echo
                echo "=== plain TCP to api.usaspending.gov:443 ==="
                timeout 5 bash -c '</dev/tcp/api.usaspending.gov/443' && echo OPEN || echo BLOCKED
                echo
                echo "=== HTTPS HEAD via curl ==="
                curl -sS -o /dev/null -w "status=%{http_code} time=%{time_total}s\n" \
                  --max-time 15 \
                  "https://api.usaspending.gov/api/v2/references/agency/"
                echo
                echo "=== Node fetch test ==="
                cat <<'JS' > /tmp/usa-probe.mjs
                  const r = await fetch('https://api.usaspending.gov/api/v2/references/agency/', { signal: AbortSignal.timeout(15000) });
                  console.log({ status: r.status, ok: r.ok });
                JS
                sudo -u awards node /tmp/usa-probe.mjs 2>&1 || echo "node fetch FAILED with exit \$?"
                rm -f /tmp/usa-probe.mjs
                echo
                echo "=== outbound IP ==="
                curl -sS https://ifconfig.me/ip; echo
                echo
                echo "=== iptables OUTPUT chain (top 10) ==="
                sudo iptables -L OUTPUT -n --line-numbers | head -15
          EOF
              ;;

            stop)
              $SSH bash <<EOF
                set -e
                if [ -f $PIDFILE ] && kill -0 \$(cat $PIDFILE) 2>/dev/null; then
                  PID=\$(cat $PIDFILE)
                  echo "Killing backfill PID \$PID"
                  sudo kill -- -\$PID 2>/dev/null || sudo kill \$PID 2>/dev/null || true
                  sleep 2
                  if kill -0 \$PID 2>/dev/null; then
                    echo "Force killing"
                    sudo kill -9 \$PID 2>/dev/null || true
                  fi
                  rm -f $PIDFILE
                  echo "Stopped."
                else
                  echo "Nothing running."
                fi
          EOF
              ;;

            incremental|*)
              # One systemd-driven batch. Synchronous because each batch is
              # bounded (~50 awards, < 2 min on a healthy USAspending day).
              $SSH bash <<EOF
                set -e
                echo "=== firing one service run ==="
                sudo systemctl status awards-enrich-descriptions.service --no-pager -n 3 || true
                sudo systemctl start awards-enrich-descriptions.service
                # Stream the journal as it produces output. journalctl -f
                # keeps SSH active so no broken-pipe risk.
                sleep 2
                sudo journalctl -u awards-enrich-descriptions.service \
                  --no-pager --since "2 minutes ago" -f &
                JPID=\$!
                # Wait for the unit to become inactive.
                while sudo systemctl is-active --quiet awards-enrich-descriptions.service; do
                  sleep 5
                done
                kill \$JPID 2>/dev/null || true
                echo
                echo "=== final status ==="
                sudo systemctl status awards-enrich-descriptions.service --no-pager -n 10 || true
          EOF
              ;;
          esac
