name = "sam-api-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# v1 created the SamApiBudget Durable Object class.
# v2 retires it — budget tracking moved to D1 (sam_api_budget table) so the
# worker can run on Cloudflare Free tier (Durable Objects require Paid).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SamApiBudget"]

[[migrations]]
tag = "v2"
deleted_classes = ["SamApiBudget"]

[[d1_databases]]
binding = "DB"
database_name = "awards-warehouse"
database_id = "c3aec4e5-f052-4deb-94f8-9625337d8e94"

[[kv_namespaces]]
binding = "META"
id = "40195caf76f34e4aa043530a3b0c5f3c"

# Secret set via: wrangler secret put SAM_GOV_API_KEY
# (see .dev.vars.example for local development)

[observability]
enabled = true
head_sampling_rate = 1.0
