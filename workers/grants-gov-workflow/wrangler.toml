name = "grants-gov-workflow"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[workflows]]
name = "grants-gov-sync"
binding = "GRANTS_GOV_WORKFLOW"
class_name = "GrantsGovSyncWorkflow"

[[d1_databases]]
binding = "DB"
database_name = "awards-warehouse"
database_id = "c3aec4e5-f052-4deb-94f8-9625337d8e94"

[[r2_buckets]]
binding = "STAGING"
bucket_name = "awards-staging"

[[kv_namespaces]]
binding = "META"
id = "40195caf76f34e4aa043530a3b0c5f3c"

[observability]
enabled = true
head_sampling_rate = 1.0
