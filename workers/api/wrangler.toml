name = "api-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Public-facing base URL where users actually load the dashboard.
# The Cloudflare Pages site at this origin proxies /auth/* and /api/* to this
# worker, which makes the session cookie first-party — required because
# browsers (Edge tracking prevention, Safari ITP, Chrome 3rd-party blocking)
# silently drop cross-site cookies.
[vars]
AUTH_PUBLIC_BASE_URL = "https://awards-dashboard.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "awards-warehouse"
database_id = "c3aec4e5-f052-4deb-94f8-9625337d8e94"
migrations_dir = "../../packages/migrations"

[[kv_namespaces]]
binding = "META"
id = "40195caf76f34e4aa043530a3b0c5f3c"

# Service binding to the (now stateless) sam-api-worker for on-demand vendor enrichment.
# Optional — only needed if you keep the Enrich button working in the dashboard.
[[services]]
binding = "SAM_API"
service = "sam-api-worker"

# Workers AI binding — used by /ai/ask routes. Free tier covers 10K
# neurons/day which is plenty for prototyping. Same binding handles both
# generation (Llama 3.1 8B) and embeddings (BGE base). Models referenced
# at call time via env.AI.run('@cf/meta/...', {...}).
[ai]
binding = "AI"

# Vectorize binding intentionally commented out — the existing
# CLOUDFLARE_API_TOKEN secret lacks Vectorize:Edit scope, so wrangler
# can neither create the index nor reference it during deploy. Once the
# token is broadened (Cloudflare Dashboard → My Profile → API Tokens
# → edit token → add "Vectorize: Edit"), uncomment this and re-deploy.
[[vectorize]]
binding = "VEC"
index_name = "awardlens-awards"

[observability]
enabled = true
head_sampling_rate = 1.0

# ── AI v2 secrets (Configuration D) ─────────────────────────────────────────
# These are NOT in [vars] — set them as worker secrets so they never appear
# in source or wrangler.toml output:
#
#   wrangler secret put FIREWORKS_API_KEY  --name api-worker
#   wrangler secret put ANTHROPIC_API_KEY  --name api-worker
#
# After setting, they appear as c.env.FIREWORKS_API_KEY / c.env.ANTHROPIC_API_KEY
# in the worker. The Env interface in src/index.ts declares both as required strings.
