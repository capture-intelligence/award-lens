name = "api-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "awards-warehouse"
database_id = "c3aec4e5-f052-4deb-94f8-9625337d8e94"
migrations_dir = "../../packages/migrations"

[[kv_namespaces]]
binding = "META"
id = "40195caf76f34e4aa043530a3b0c5f3c"

# Service binding to the (now stateless) sam-api-worker for on-demand vendor enrichment.
# Optional — only needed if you keep the Enrich button working in the dashboard.
[[services]]
binding = "SAM_API"
service = "sam-api-worker"

[observability]
enabled = true
head_sampling_rate = 1.0
