name = "upsert-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "awards-warehouse"
database_id = "c3aec4e5-f052-4deb-94f8-9625337d8e94"

[[queues.consumers]]
queue = "upsert-queue"
max_batch_size = 10
max_batch_timeout = 10
max_retries = 5
dead_letter_queue = "dlq"

[observability]
enabled = true
