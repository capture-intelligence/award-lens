#  CaptureRadar API — nginx reverse proxy.
#  Cloudflare fronts this VM (orange-cloud DNS), so we accept HTTP-only on the
#  origin and let Cloudflare handle TLS termination. If the origin is ever
#  exposed without Cloudflare in front, swap this to listen 443 ssl + add a
#  certbot block.

upstream captureradar_api {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen      80 default_server;
  listen      [::]:80 default_server;
  server_name _;

  # Long body limit for export uploads + document attachments.
  client_max_body_size 50m;

  # Real client IP through Cloudflare. List from
  # https://www.cloudflare.com/ips/ (refresh periodically).
  set_real_ip_from 173.245.48.0/20;
  set_real_ip_from 103.21.244.0/22;
  set_real_ip_from 103.22.200.0/22;
  set_real_ip_from 103.31.4.0/22;
  set_real_ip_from 141.101.64.0/18;
  set_real_ip_from 108.162.192.0/18;
  set_real_ip_from 190.93.240.0/20;
  set_real_ip_from 188.114.96.0/20;
  set_real_ip_from 197.234.240.0/22;
  set_real_ip_from 198.41.128.0/17;
  set_real_ip_from 162.158.0.0/15;
  set_real_ip_from 104.16.0.0/13;
  set_real_ip_from 104.24.0.0/14;
  set_real_ip_from 172.64.0.0/13;
  set_real_ip_from 131.0.72.0/22;
  real_ip_header CF-Connecting-IP;

  # Health and readiness — short timeouts so monitors fail fast.
  location = /health {
    proxy_pass http://captureradar_api;
    proxy_read_timeout 5s;
  }
  location = /health/ready {
    proxy_pass http://captureradar_api;
    proxy_read_timeout 5s;
  }

  # API
  location / {
    proxy_pass http://captureradar_api;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    proxy_buffering    off;            # streaming endpoints (chat, exports)
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}
